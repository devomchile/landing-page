[build]
command = "npm run build"
publish = "dist/main/browser"

[context.production]
command = "npm run build -- --configuration production"

[context.develop]
command = "npm run build -- --configuration development"

[build.environment]
NODE_VERSION = "22"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[build.processing.html]
pretty_urls = true
