<!-- Mockup Dashboard -->
<div class="relative hidden lg:block">
  <!-- Glow detrás del mockup -->
  <div
    class="absolute inset-0 rounded-3xl blur-[60px]"
    style="background: var(--gradient-brand); opacity: 0.15"
  ></div>

  <div
    class="glass relative rounded-3xl p-6"
    style="
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    "
  >
    <!-- Barra superior del dashboard -->
    <div class="flex items-center gap-2 mb-5">
      <div
        class="w-3 h-3 rounded-full"
        style="background: var(--color-error)"
      ></div>
      <div
        class="w-3 h-3 rounded-full"
        style="background: var(--color-warning)"
      ></div>
      <div
        class="w-3 h-3 rounded-full"
        style="background: var(--color-success)"
      ></div>
      <div
        class="flex-1 ml-4 h-7 rounded-lg px-3 flex items-center"
        style="
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.08);
        "
      >
        <span class="text-xs" style="color: var(--color-text-muted)"
          >devom.cl/dashboard</span
        >
      </div>
    </div>

    <!-- Contenido del dashboard mock -->
    <div class="grid grid-cols-3 gap-4 mb-4">
      @for(item of cardsBanner; track item){
      <div class="glass rounded-xl p-4">
        <div class="text-xs mb-1" style="color: var(--color-text-muted)">
          {{ item.name }}
        </div>
        <div
          class="text-2xl font-bold"
          style="
            color: var(--color-text-primary);
            font-family: var(--font-heading);
          "
        >
          {{ item.count }}
        </div>
        <div class="flex items-center gap-1 mt-1">
          <app-icon class="pt-2">{{ item.icon }}</app-icon>
          <span class="text-xs" style="color: var(--color-success)"
            >+{{ item.porcent }}%</span
          >
        </div>
      </div>
      }
    </div>

    <!-- Gráfico mock -->
    <div class="glass rounded-xl p-5">
      <div class="flex items-center justify-between mb-4">
        <span
          class="text-sm font-semibold"
          style="color: var(--color-text-primary)"
          >Rendimiento mensual</span
        >
        <span
          class="text-xs px-2 py-1 rounded-full"
          style="
            background: var(--color-accent-subtle);
            color: var(--color-accent);
          "
          >Este mes</span
        >
      </div>
      <div class="flex items-end gap-2 h-32">
        <div
          class="flex-1 rounded-t-lg"
          style="background: var(--gradient-brand); height: 45%"
        ></div>
        <div
          class="flex-1 rounded-t-lg"
          style="background: var(--gradient-brand); height: 65%"
        ></div>
        <div
          class="flex-1 rounded-t-lg"
          style="background: var(--gradient-brand); height: 55%"
        ></div>
        <div
          class="flex-1 rounded-t-lg"
          style="background: var(--gradient-brand); height: 80%"
        ></div>
        <div
          class="flex-1 rounded-t-lg"
          style="background: var(--gradient-brand); height: 70%"
        ></div>
        <div
          class="flex-1 rounded-t-lg"
          style="background: var(--gradient-brand); height: 90%"
        ></div>
        <div
          class="flex-1 rounded-t-lg"
          style="background: var(--gradient-brand); height: 85%"
        ></div>
        <div
          class="flex-1 rounded-t-lg"
          style="background: var(--gradient-brand); height: 95%"
        ></div>
      </div>
    </div>
  </div>
</div>
