<div class="py-6">
  <section
    id="home"
    class="relative min-h-screen flex items-center pt-18 overflow-hidden"
    [style.background]="'var(--gradient-hero)'"
  >
    <!-- Orbs decorativos -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div
        class="absolute w-[700px] h-[700px] rounded-full blur-[150px]"
        style="
          background: var(--color-accent);
          opacity: 0.08;
          top: -250px;
          right: -200px;
        "
      ></div>
      <div
        class="absolute w-[500px] h-[500px] rounded-full blur-[130px]"
        style="
          background: var(--color-purple);
          opacity: 0.06;
          bottom: -150px;
          left: -100px;
        "
      ></div>
      <div
        class="absolute w-[400px] h-[400px] rounded-full blur-[100px]"
        style="
          background: var(--color-sky);
          opacity: 0.04;
          top: 40%;
          left: 50%;
          transform: translate(-50%, -50%);
        "
      ></div>
    </div>

    <div
      class="container relative z-10 grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16 items-center"
    >
      <!-- Texto -->
      <div class="flex flex-col gap-7">
        <h1
          class="text-[clamp(2rem,5vw,3.75rem)] leading-[1.1]"
          style="
            color: var(--color-text-primary);
            font-family: var(--font-heading);
            font-weight: 700;
            letter-spacing: -0.03em;
          "
        >
          Construimos el futuro
          <span class="gradient-text">digital</span>
          de tu empresa
        </h1>

        <p
          class="text-[clamp(0.95rem,1.8vw,1.1rem)] leading-[1.7] max-w-[520px]"
          style="
            color: var(--color-text-secondary);
            font-family: var(--font-body);
          "
        >
          En
          <strong class="font-semibold" style="color: var(--color-text-primary)"
            >Devom</strong
          >
          transformamos ideas en experiencias digitales excepcionales.
          Desarrollo web, movil y estrategias digitales que impulsan tu negocio.
        </p>

        <div class="flex flex-wrap gap-4">
          <app-whatsapp-button>
            <app-button variant="primary" size="lg">
              Comenzar proyecto
            </app-button>
          </app-whatsapp-button>
          <a href="#services">
            <app-button variant="glass" size="lg">Ver servicios</app-button>
          </a>
        </div>

        <div
          class="flex flex-wrap gap-8 pt-6 border-t"
          style="border-color: var(--color-border)"
        >
          <app-feature-item icon="rocket" label="Entrega rápida" />
          <app-feature-item icon="shield" label="Código seguro" />
          <app-feature-item icon="lightning" label="Alto rendimiento" />
        </div>
      </div>

      <app-hero-dashboard />
    </div>
  </section>
</div>
