<section
  class="section mt-8 relative overflow-hidden"
  style="background: var(--color-bg-secondary)"
>
  <div class="absolute inset-0 pointer-events-none">
    <div
      class="absolute w-[500px] h-[500px] rounded-full blur-[120px]"
      style="
        background: var(--color-accent);
        opacity: 0.06;
        top: -200px;
        left: -100px;
      "
    ></div>
    <div
      class="absolute w-[400px] h-[400px] rounded-full blur-[110px]"
      style="
        background: var(--color-purple);
        opacity: 0.04;
        bottom: -150px;
        right: -100px;
      "
    ></div>
  </div>

  <div class="container relative z-10 text-center max-w-[650px] mx-auto">
    <h2
      class="text-[clamp(1.8rem,4vw,2.8rem)] leading-tight mb-6"
      style="
        color: var(--color-text-primary);
        font-family: var(--font-heading);
        letter-spacing: -0.02em;
      "
    >
      &#191;Listo para transformar tu negocio?
    </h2>
    <p
      class="text-lg mb-8 leading-relaxed"
      style="color: var(--color-text-secondary); font-family: var(--font-body)"
    >
      Contactanos hoy y descubre como podemos llevar tu empresa al siguiente
      nivel digital.
    </p>
    <div class="flex flex-wrap gap-4 justify-center">
      <app-whatsapp-button>
        <app-button variant="primary" size="lg"
          >Solicitar cotizacion</app-button
        ></app-whatsapp-button
      >
      <app-button variant="glass" size="lg">Agendar llamada</app-button>
    </div>
  </div>
</section>
