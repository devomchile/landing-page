<section class="section" style="background: var(--color-bg-secondary)">
  <div class="container">
    <div class="text-center mb-16">
      <span
        class="inline-block px-4 py-1.5 rounded-full text-xs font-semibold uppercase tracking-wider mb-4"
        style="
          background: var(--color-accent-subtle);
          color: var(--color-accent);
          font-family: var(--font-body);
        "
      >
        Servicios
      </span>
      <h2
        class="text-[clamp(1.8rem,4vw,2.8rem)] leading-tight mb-4"
        style="
          color: var(--color-text-primary);
          font-family: var(--font-heading);
          letter-spacing: -0.02em;
        "
      >
        Todo lo que tu negocio necesita para
        <span class="gradient-text">crecer</span>
      </h2>
      <p
        class="text-lg max-w-[520px] mx-auto"
        style="
          color: var(--color-text-secondary);
          font-family: var(--font-body);
        "
      >
        Ofrecemos soluciones completas para cada etapa de tu proyecto digital
      </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for(item of cardData; track item){<app-card
        title="{{ item.title }}"
        icon="{{ item.icon }}"
        [hoverable]="true"
      >
        {{ item.description }} </app-card
      >}
    </div>
  </div>
</section>
